<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 624" font-family="'Segoe UI', 'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f3d3a"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="880" height="624" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="879" height="623" rx="16" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== Header ===== -->
  <circle cx="42" cy="42" r="11" fill="none" stroke="url(#brand)" stroke-width="2.5"/>
  <circle cx="42" cy="42" r="3.5" fill="#38bdf8"/>
  <text x="66" y="40" font-size="26" font-weight="700" fill="url(#brand)">SingPilot</text>
  <text x="67" y="58" font-size="12.5" fill="#94a3b8">AI-native control plane for sing-box</text>
  <text x="838" y="34" text-anchor="end" font-size="11" fill="#64748b">Windows · PowerShell · zero-dependency</text>
  <text x="838" y="52" text-anchor="end" font-size="11" fill="#64748b">~30 KB of scripts</text>

  <!-- ===== Row A: two control sources ===== -->
  <g filter="url(#soft)">
    <rect x="40" y="86" width="378" height="54" rx="10" fill="#151f33" stroke="#2b3a55"/>
    <rect x="462" y="86" width="378" height="54" rx="10" fill="#151f33" stroke="#2b3a55"/>
  </g>
  <circle cx="66" cy="113" r="9" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="66" y="117" text-anchor="middle" font-size="10">🧑</text>
  <text x="86" y="109" font-size="13.5" font-weight="600" fill="#e2e8f0">You</text>
  <text x="86" y="127" font-size="11" fill="#8ba0bd">double-click manage.bat → terminal menu</text>

  <circle cx="488" cy="113" r="9" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="488" y="117" text-anchor="middle" font-size="10">🤖</text>
  <text x="508" y="109" font-size="13.5" font-weight="600" fill="#e2e8f0">AI Agent</text>
  <text x="508" y="127" font-size="11" fill="#8ba0bd">read logs · run scripts · call Clash REST API</text>

  <!-- arrows into control plane -->
  <line x1="229" y1="140" x2="229" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="651" y1="140" x2="651" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== Row B: Control plane ===== -->
  <g filter="url(#soft)">
    <rect x="40" y="170" width="800" height="192" rx="12" fill="#111a2b" stroke="#2b3a55"/>
  </g>
  <text x="58" y="196" font-size="13" font-weight="600" fill="#cbd5e1">manage.bat → menu.ps1</text>
  <text x="58" y="212" font-size="10.5" fill="#64748b">interactive menu engine</text>
  <!-- legend -->
  <circle cx="612" cy="192" r="4" fill="#38bdf8"/><text x="622" y="196" font-size="10" fill="#8ba0bd">proxy</text>
  <circle cx="672" cy="192" r="4" fill="#a78bfa"/><text x="682" y="196" font-size="10" fill="#8ba0bd">lifecycle</text>
  <circle cx="748" cy="192" r="4" fill="#34d399"/><text x="758" y="196" font-size="10" fill="#8ba0bd">tools</text>
  <circle cx="800" cy="192" r="4" fill="#fbbf24"/><text x="810" y="196" font-size="10" fill="#8ba0bd">speed</text>

  <!-- action pills row 1 -->
  <g font-size="11" fill="#dbe4f0">
    <rect x="56"  y="224" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="106" y="243" text-anchor="middle"><tspan fill="#38bdf8" font-weight="700">[1]</tspan> Start</text>
    <rect x="167" y="224" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="217" y="243" text-anchor="middle"><tspan fill="#38bdf8" font-weight="700">[2]</tspan> Stop</text>
    <rect x="278" y="224" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="328" y="243" text-anchor="middle"><tspan fill="#38bdf8" font-weight="700">[3]</tspan> Status</text>
    <rect x="389" y="224" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="439" y="243" text-anchor="middle"><tspan fill="#38bdf8" font-weight="700">[4]</tspan> Nodes</text>
    <rect x="500" y="224" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="550" y="243" text-anchor="middle"><tspan fill="#38bdf8" font-weight="700">[5]</tspan> Update</text>
    <rect x="611" y="224" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="661" y="243" text-anchor="middle"><tspan fill="#a78bfa" font-weight="700">[6]</tspan> Watchdog</text>
    <rect x="722" y="224" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="772" y="243" text-anchor="middle"><tspan fill="#a78bfa" font-weight="700">[7]</tspan> Autostart</text>
  </g>
  <!-- action pills row 2 -->
  <g font-size="11" fill="#dbe4f0">
    <rect x="56"  y="262" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="106" y="281" text-anchor="middle"><tspan fill="#a78bfa" font-weight="700">[8]</tspan> Setup</text>
    <rect x="167" y="262" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="217" y="281" text-anchor="middle"><tspan fill="#34d399" font-weight="700">[9]</tspan> Sys Proxy</text>
    <rect x="278" y="262" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="328" y="281" text-anchor="middle"><tspan fill="#34d399" font-weight="700">[10]</tspan> DNS</text>
    <rect x="389" y="262" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="439" y="281" text-anchor="middle"><tspan fill="#34d399" font-weight="700">[11]</tspan> Logs</text>
    <rect x="500" y="262" width="212" height="30" rx="7" fill="#1b2436" stroke="#5a4a2a"/>
    <text x="606" y="281" text-anchor="middle"><tspan fill="#fbbf24" font-weight="700">[12]</tspan> Speed Test / Switch Node</text>
    <rect x="722" y="262" width="101" height="30" rx="7" fill="#182338" stroke="#2b3a55"/>
    <text x="772" y="281" text-anchor="middle"><tspan fill="#fb7185" font-weight="700">[0]</tspan> Exit</text>
  </g>
  <!-- shared core strip -->
  <rect x="56" y="306" width="768" height="38" rx="8" fill="#0e1626" stroke="#243349"/>
  <text x="72" y="329" font-size="11.5" fill="#7dd3fc" font-weight="600">env.ps1</text>
  <text x="132" y="329" font-size="11" fill="#8ba0bd">shared core — state snapshot · auto port detection · config parsing · path resolution</text>

  <!-- arrows to engine -->
  <line x1="235" y1="362" x2="235" y2="392" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="645" y1="362" x2="645" y2="392" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== Row C: engine (user-supplied) ===== -->
  <g filter="url(#soft)">
    <rect x="40" y="394" width="390" height="80" rx="12" fill="url(#engine)" stroke="#1c6b63"/>
    <rect x="450" y="394" width="390" height="80" rx="12" fill="url(#engine)" stroke="#1c6b63"/>
  </g>
  <text x="235" y="422" text-anchor="middle" font-size="15" font-weight="700" fill="#ecfdf5">sing-box.exe</text>
  <text x="235" y="441" text-anchor="middle" font-size="10.5" fill="#7fd8c8">you download it from the official releases</text>
  <text x="235" y="459" text-anchor="middle" font-size="10.5" fill="#5eead4">TUN · DNS · Routing · Clash API</text>

  <text x="645" y="422" text-anchor="middle" font-size="15" font-weight="700" fill="#ecfdf5">config.json</text>
  <text x="645" y="441" text-anchor="middle" font-size="10.5" fill="#7fd8c8">you bring it from your provider</text>
  <text x="645" y="459" text-anchor="middle" font-size="10.5" fill="#5eead4">Inbounds · Outbounds · Rules · DNS</text>

  <!-- arrows to guardian band -->
  <line x1="235" y1="474" x2="235" y2="502" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="645" y1="474" x2="645" y2="502" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== Row D: guardian + dashboard ===== -->
  <rect x="40" y="504" width="520" height="82" rx="12" fill="#141726" stroke="#3b2f5e"/>
  <text x="60" y="528" font-size="13" font-weight="600" fill="#c4b5fd">🛡 Guardian — Windows Scheduled Tasks</text>
  <text x="60" y="549" font-size="10.5" fill="#94a3b8">Health check every 5 min · daily restart 4 AM · memory guard every 10 min</text>
  <text x="60" y="567" font-size="10.5" fill="#94a3b8">Auto-restart on freeze · rotates sing-box.log · boot autostart (SYSTEM)</text>

  <rect x="580" y="504" width="260" height="82" rx="12" fill="#0f1f1c" stroke="#1c6b63"/>
  <text x="600" y="528" font-size="13" font-weight="600" fill="#5eead4">📊 YACD Dashboard</text>
  <text x="600" y="549" font-size="10.5" fill="#94a3b8">http://127.0.0.1:9090/ui</text>
  <text x="600" y="567" font-size="10.5" fill="#94a3b8">Proxies · Rules · Connections · Logs</text>

  <!-- footer -->
  <text x="440" y="608" text-anchor="middle" font-size="10.5" fill="#546178">Every function is a file or a command — humans and AI agents drive the exact same controls.</text>
</svg>
